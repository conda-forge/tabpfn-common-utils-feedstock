schema_version: 1

context:
  name: tabpfn-common-utils
  version: 0.2.20

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tabpfn_common_utils-${{ version }}.tar.gz
  sha256: 8a573158b2a89ca2485f09e1afdc6bc5f96da0513b9054345c29eaeba0b04b61

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.25
    - hatch-vcs >=0.3
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.21.6
    - pandas >=1.4.0
    - scikit-learn >=1.2.0
    - typing_extensions >=4.12
    - posthog >=6.7
    - platformdirs >=4
    - filelock >=3.19.1
    - requests >=2.32.5
    - nvidia-ml-py >=13.590.48
tests:
  - python:
      imports:
        - tabpfn_common_utils
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Utilities shared between TabPFN codebases
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://priorlabs.ai

extra:
  recipe-maintainers:
    - janjagusch
